spring:
  application:
    name: QLNH-PhanTan

  datasource:
    main:
      jdbc-url: jdbc:sqlserver://${MAIN_DB_HOST}:${MAIN_DB_PORT};databaseName=${MAIN_DB_NAME};encrypt=true;trustServerCertificate=true
      username: ${MAIN_DB_USER}
      password: ${MAIN_DB_PASS}
      driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
    site1:
      jdbc-url: jdbc:sqlserver://${SITE1_DB_HOST}:${SITE1_DB_PORT};databaseName=${SITE1_DB_NAME};encrypt=false;trustServerCertificate=true
      username: ${SITE1_DB_USER}
      password: ${SITE1_DB_PASS}
      driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
    site2:
      jdbc-url: jdbc:sqlserver://${SITE2_DB_HOST}:${SITE2_DB_PORT};databaseName=${SITE2_DB_NAME};encrypt=false;trustServerCertificate=true
      username: ${SITE2_DB_USER}
      password: ${SITE2_DB_PASS}
      driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver


  jpa:
    hibernate:
      ddl-auto: none
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServerDialect
        format_sql: true


server:
  port: 8080
